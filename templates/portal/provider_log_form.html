{% extends 'portal/base.html' %}
{% block title %}Add Service Log - ERP{% endblock %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
    <h3 class="fw-bold mb-0"><i class="bi bi-journal-plus"></i> Add Service Log</h3>
    <a href="{% url 'erp:provider_detail' provider.id %}" class="btn btn-outline-secondary btn-sm"><i class="bi bi-arrow-left"></i> Back</a>
</div>
<div class="card mb-3"><div class="card-body">
    <p class="mb-0"><strong>Provider:</strong> {{ provider.company_name }}</p>
</div></div>
<div class="card"><div class="card-header bg-purple text-white"><h6 class="mb-0">Service Log Details</h6></div>
<div class="card-body">
<form method="post">
    {% csrf_token %}
    <div class="row g-3">
        <div class="col-md-6">
            <label class="form-label">Event</label>
            <select name="event_id" class="form-select">
                <option value="">-- None --</option>
                {% for e in events %}
                <option value="{{ e.id }}">{{ e.name }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="col-md-3">
            <label class="form-label">Service Date</label>
            <input type="date" name="service_date" class="form-control" required>
        </div>
        <div class="col-md-3">
            <label class="form-label">Amount Charged (R)</label>
            <input type="number" name="amount_charged" step="0.01" class="form-control" value="0">
        </div>
        <div class="col-12">
            <label class="form-label">Description</label>
            <textarea name="description" class="form-control" rows="3" required></textarea>
        </div>
        <div class="col-12">
            <label class="form-label">Notes</label>
            <textarea name="notes" class="form-control" rows="2"></textarea>
        </div>
    </div>
    <div class="mt-3">
        <button type="submit" class="btn btn-purple"><i class="bi bi-check-lg"></i> Save Service Log</button>
        <a href="{% url 'erp:provider_detail' provider.id %}" class="btn btn-outline-secondary">Cancel</a>
    </div>
</form>
</div></div>
{% endblock %}
