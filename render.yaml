services:
  - type: web
    name: alansaar-erp
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn core.wsgi:application
    envVars:
      - key: PYTHON_VERSION
        value: "3.12"
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "false"
      - key: ALLOWED_HOSTS
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: alansaar-db
          property: connectionString
      - key: SITE_URL
        sync: false
    healthCheckPath: /
    autoDeploy: true
    disk:
      name: media
      mountPath: /opt/render/project/src/media
      sizeGB: 1

databases:
  - name: alansaar-db
    plan: free
    databaseName: alansaar_erp
