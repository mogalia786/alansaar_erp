services:
  - type: web
    name: alansaar-erp
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python manage.py migrate --run-syncdb && python manage.py collectstatic --no-input && gunicorn core.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.12"
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "false"
      - key: ALLOWED_HOSTS
        value: "*"
      - key: DATABASE_URL
        fromDatabase:
          name: alansaar-db
          property: connectionString
      - key: SITE_URL
        value: "https://alansaar.site"
    healthCheckPath: /healthz/
    autoDeploy: true

databases:
  - name: alansaar-db
    plan: free
    databaseName: alansaar_erp
