services:
  - type: web
    name: alansaar-erp
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn core.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.12"
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "false"
      - key: ALLOWED_HOSTS
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: alansaar-db
          property: connectionString
      - key: SITE_URL
        sync: false
    healthCheckPath: /healthz/
    autoDeploy: true

databases:
  - name: alansaar-db
    plan: free
    databaseName: alansaar_erp
