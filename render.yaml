services:
  - type: web
    name: alansaar-erp
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python manage.py migrate --run-syncdb && python manage.py collectstatic --no-input && gunicorn core.wsgi:application --bind 0.0.0.0:$PORT --timeout 120
    envVars:
      - key: PYTHON_VERSION
        value: "3.12"
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "false"
      - key: ALLOWED_HOSTS
        value: "*"
      - key: DATABASE_URL
        fromDatabase:
          name: alansaar-db
          property: connectionString
      - key: SITE_URL
        value: "https://alansaar.site"
      - key: EMAIL_BACKEND
        value: "django.core.mail.backends.smtp.EmailBackend"
      - key: EMAIL_HOST
        value: "mail.mogalia.co.za"
      - key: EMAIL_PORT
        value: "465"
      - key: EMAIL_USE_SSL
        value: "True"
      - key: EMAIL_HOST_USER
        value: "alansaar@mogalia.co.za"
      - key: EMAIL_HOST_PASSWORD
        value: "Faroq#786"
      - key: DEFAULT_FROM_EMAIL
        value: "Al Ansaar Foundation <alansaar@mogalia.co.za>"
    healthCheckPath: /healthz/
    autoDeploy: true

databases:
  - name: alansaar-db
    plan: free
    databaseName: alansaar_erp
